<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Test</title>
</head>
<body>
  <h2>Location Test</h2>
  <button onclick="getLocation()">Share my location</button>
  <p id="demo">Waiting...</p>

  <script>
    function getLocation() {
      const demo = document.getElementById("demo");

      if (!navigator.geolocation) {
        demo.innerHTML = "Geolocation not supported on this browser.";
        return;
      }

      demo.innerHTML = "Requesting location permission...";

      navigator.geolocation.getCurrentPosition(
        sendPosition,
        showError,
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function sendPosition(position) {
      const demo = document.getElementById("demo");

      const data = {
        latitude: position.coords.latitude,
        longitude: position.coords.longitude,
        accuracy: position.coords.accuracy,
        timestamp: new Date(position.timestamp).toISOString()
      };

      demo.innerHTML =
        "Location found.<br>" +
        "Latitude: " + data.latitude + "<br>" +
        "Longitude: " + data.longitude + "<br>" +
        "Sending to server...";

      fetch("/api/location", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      })
      .then(async (res) => {
        const result = await res.json();
        if (!res.ok) {
          throw new Error(result.error || "Server error");
        }
        return result;
      })
      .then((result) => {
        demo.innerHTML +=
          "<br><br>Sent successfully." +
          `<br><a href="${result.mapUrl}" target="_blank" rel="noopener noreferrer">Open on map</a>`;
      })
      .catch((err) => {
        demo.innerHTML += "<br><br>Failed to send: " + err.message;
      });
    }

    function showError(error) {
      document.getElementById("demo").innerHTML =
        "Location error: " + error.message;
    }
  </script>
</body>
</html>
